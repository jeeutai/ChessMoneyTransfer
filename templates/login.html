<!DOCTYPE html>
<html>
<head>
    <title>Login - ChessMoney</title>
    <style>
        body { background-color: #2e7d32; color: white; text-align: center; font-family: Arial, sans-serif; }
        .container { margin-top: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form method="post">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">Login</button>
        </form>
        <a href="/register">Register</a>
    </div>
</body>
</html>
