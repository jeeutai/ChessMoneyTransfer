<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { background-color: #2e7d32; color: white; text-align: center; font-family: Arial, sans-serif; }
        table { width: 80%; margin: auto; border-collapse: collapse; }
        th, td { border: 1px solid white; padding: 10px; }
        .btn { background-color: red; color: white; padding: 5px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Admin Dashboard</h2>
    <table>
        <tr>
            <th>ID</th><th>Username</th><th>Balance</th><th>Admin</th><th>Update</th><th>Delete</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.balance }}</td>
            <td>{{ "Yes" if user.is_admin else "No" }}</td>
            <td>
                <form method="post" action="{{ url_for('update_balance', user_id=user.id) }}">
                    <input type="number" name="balance" step="0.01" value="{{ user.balance }}">
                    <button type="submit">Update</button>
                </form>
            </td>
            <td>
                <form method="post" action="{{ url_for('delete_user', user_id=user.id) }}">
                    <button type="submit" class="btn">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
