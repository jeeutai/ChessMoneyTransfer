<!DOCTYPE html>
<html lang="ko">
		{% include 'navbar.html' %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        body {
            font-family: Lora, Merriweather;
            text-align: center;
            margin: 50px;
        }
        .container {
            max-width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #f9f9f9;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #A0D468;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #81c147;
        }
        .error-message {
            color: red;
            margin-top: 10px;
        }
        a {
            display: block;
            margin-top: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>체스제국 송금 서비스</h2>
		<h3>회원가입</h3>
        <form action="{{ url_for('register') }}" method="POST">
            <input type="text" name="username" placeholder="사용자명" required><br>
            <input type="password" name="password" placeholder="비밀번호" required><br>
            <button type="submit">가입하기</button>
        </form>
        {% if message %}
            <p class="error-message">{{ message }}</p>
        {% endif %}
        <a href="{{ url_for('login') }}">이미 계정이 있으십니까? 로그인</a>
    </div>
</body>
</html>
