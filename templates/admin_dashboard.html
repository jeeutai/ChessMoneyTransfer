<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: green;
            color: white;
        }
        .container {
            width: 80%;
            margin: auto;
            text-align: center;
        }
        .btn {
            padding: 5px 10px;
            border: none;
            cursor: pointer;
        }
        .btn-edit { background-color: #ffc107; }
        .btn-delete { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
	{% include 'navbar.html' %}
	<h1> </h1>
<div class="title-box">
    <div class="container">
        <h1>관리자 대시보드</h1>
        
        <h2>회원 목록</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>사용자명</th>
                    <th>잔액</th>
                    <th>관리자 여부</th>
                    <th>수정</th>
                    <th>삭제</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.balance }}</td>
                    <td>{{ "✔" if user.is_admin else "❌" }}</td>
                    <td>
                        <button class="btn btn-edit" onclick="editUser('{{ user.id }}', '{{ user.username }}', '{{ user.balance }}')">수정</button>
                    </td>
                    <td>
                        <form action="{{ url_for('delete_user') }}" method="POST">
                            <input type="hidden" name="user_id" value="{{ user.id }}">
                            <button class="btn btn-delete" type="submit">삭제</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <h2>새로운 회원 추가</h2>
        <form action="{{ url_for('add_user') }}" method="POST">
            <input type="text" name="username" placeholder="사용자명" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <input type="number" step="0.01" name="balance" placeholder="초기 잔액" required>
            <label><input type="checkbox" name="is_admin"> 관리자 권한</label>
            <button type="submit">회원 추가</button>
        </form>

        <h2>급여 지급</h2>
        <form action="{{ url_for('give_salary') }}" method="POST">
            <input type="number" name="salary_amount" placeholder="지급할 금액" required>
            <button type="submit">급여 지급</button>
        </form>
    </div>
  </div>
  
    <script>
        function editUser(id, username, balance) {
            const newBalance = prompt(`"${username}"님의 새 잔액을 입력하세요:`, balance);
            if (newBalance !== null) {
                fetch("/update_balance", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `user_id=${id}&new_balance=${newBalance}`
                }).then(() => window.location.reload());
            }
        }
    </script>
</body>
</html>
