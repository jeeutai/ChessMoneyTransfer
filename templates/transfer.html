{% extends "base.html" %}
{% include 'navbar.html' %}

{% block content %}
    <h1 class="text-center mt-4">체스머니 송금</h1>
    
    <form method="POST" class="mt-4">
        <div class="mb-3">
            <label for="recipient_id" class="form-label">수신자 아이디</label>
            <input type="text" class="form-control" id="recipient_id" name="recipient_id" required>
        </div>
        
        <div class="mb-3">
            <label for="amount" class="form-label">송금 금액</label>
            <input type="number" class="form-control" id="amount" name="amount" required>
        </div>
        
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">송금하기</button>
        </div>
    </form>

    {% if message %}
        <div class="alert alert-info mt-4" role="alert">
            {{ message }}
        </div>
    {% endif %}
{% endblock %}
