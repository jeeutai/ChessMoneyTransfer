<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { background-color: #2e7d32; color: white; text-align: center; font-family: Arial, sans-serif; }
    </style>
</head>
<body>
	{% include 'navbar.html' %}
	<h1> </h1>
<div class="title-box">
    <h2>환영합니다, {{ user.username }}님.</h2>
    <p>현재 잔액은 {{ user.balance }} 체스머니 입니다.</p>
	<h2>비밀번호 변경</h2>
<form action="{{ url_for('change_password') }}" method="POST">
    <input type="password" name="new_password" placeholder="새 비밀번호" required>
    <button type="submit">변경</button>
</form>

<h2>송금</h2>
<form action="{{ url_for('send_money') }}" method="POST">
    <input type="text" name="recipient" placeholder="받는 사람 이름" required> <br>
    <input type="number" step="0.01" name="amount" placeholder="송금할 금액" required><br>
    <button type="submit">송금</button><br> <br>
</form>

    <a href="/logout">로그아웃</a>
</div>
</body>
</html>
