<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { background-color: #2e7d32; color: white; text-align: center; font-family: Arial, sans-serif; }
    </style>
</head>
<body>
	{% include 'navbar.html' %}
    <h2>Welcome, {{ user.username }}</h2>
    <p>Your Balance: {{ user.balance }} ChessMoney</p>
	<h2>비밀번호 변경</h2>
<form action="{{ url_for('change_password') }}" method="POST">
    <input type="password" name="new_password" placeholder="새 비밀번호" required>
    <button type="submit">변경</button>
</form>

<h2>송금</h2>
<form action="{{ url_for('send_money') }}" method="POST">
    <input type="text" name="recipient" placeholder="받는 사람 ID" required>
    <input type="number" step="0.01" name="amount" placeholder="송금할 금액" required>
    <input type="text" name="memo" placeholder="메모 (선택 사항)">
    <button type="submit">송금</button>
</form>

    <a href="/logout">Logout</a>
</body>
</html>
