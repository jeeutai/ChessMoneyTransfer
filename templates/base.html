<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체스머니 서비스</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #2c5e1a; /* 초록색 */
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
        }
        .navbar a:hover {
            background-color: #3a7c2c;
        }
        .container {
            padding: 20px;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
	<h1> </h1>
    
    <div style="padding: 20px;">
        {% block content %}{% endblock %}

    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
